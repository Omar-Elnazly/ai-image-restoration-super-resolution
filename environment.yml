name: sr_project
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.10

  # PyTorch with CUDA 11.8 support (compatible with RTX 3050 Ti)
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8

  # Core scientific stack
  - numpy=1.24.3
  - matplotlib=3.7.2
  - pillow=10.0.1

  # pip packages (not available in conda or need specific versions)
  - pip
  - pip:
      - opencv-python==4.8.1.78
      - tqdm==4.66.1
      - tensorboard==2.14.0
      - gradio==4.7.1
      - pyyaml==6.0.1
      - scikit-image==0.21.0
      - scipy==1.11.3
